<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Companion - Login</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            border: 1px solid #333;
        }
        h2 {
            text-align: center;
            color: #ffb300;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #b0b0b0;
        }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background-color: #2d2d2d;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }
        input:focus {
            border-color: #ffb300;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #ffb300;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background-color: #ffa000;
        }
        .error-msg {
            color: #cf6679;
            font-size: 0.85rem;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Campaign Login</h2>
    
    {% if form.errors %}
        <div class="error-msg">Invalid username or password. Try again!</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" required>
        </div>
        
        <button type="submit">Enter Tavern</button>
    </form>
</div>

</body>
</html>
