<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset - VTT Campaign</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #eee;
        }
        
        .reset-container {
            background: #111116;
            border: 2px solid #ffaa00;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 170, 0, 0.2), 0 0 80px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #ffaa00;
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .header p {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }
        
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffaa00, transparent);
            margin: 20px 0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #0d0d11;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ffaa00;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.3);
        }
        
        .btn-reset {
            width: 100%;
            padding: 14px;
            background: #ffaa00;
            border: none;
            border-radius: 6px;
            color: #111;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-reset:hover {
            background: #cc8800;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
            transform: translateY(-2px);
        }
        
        .extra-links {
            margin-top: 20px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #2d2d3a;
        }
        
        .extra-links a {
            color: #ffaa00;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        
        .extra-links a:hover {
            color: #cc8800;
            text-decoration: underline;
        }
        
        .help-text {
            color: #666;
            font-size: 0.85rem;
            margin-top: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="header">
            <div class="icon">🔑</div>
            <h1>Password Reset</h1>
            <p>Enter your email address and we'll send you instructions to reset your password.</p>
        </div>
        
        <div class="divider"></div>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_email">📧 Email Address</label>
                {{ form.email }}
                <div class="help-text">
                    Enter the email address associated with your account. 
                    If you don't have an email set up, please contact your DM.
                </div>
            </div>
            
            <button type="submit" class="btn-reset">Send Reset Instructions</button>
        </form>
        
        <div class="extra-links">
            <a href="{% url 'login' %}">← Back to Login</a>
        </div>
    </div>
</body>
</html>
