<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed - VTT Campaign</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #eee;
        }
        
        .message-container {
            background: #111116;
            border: 2px solid #00ff88;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.2), 0 0 80px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            color: #00ff88;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        p {
            color: #aaa;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            margin: 30px 0;
        }
        
        .btn-dashboard {
            display: inline-block;
            padding: 14px 40px;
            background: #ffaa00;
            border: none;
            border-radius: 6px;
            color: #111;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-dashboard:hover {
            background: #cc8800;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="message-container">
        <div class="icon">✅</div>
        <h1>Password Updated!</h1>
        <p>
            Your password has been successfully changed. 
            Your account is now more secure.
        </p>
        
        <div class="divider"></div>
        
        <a href="{% url 'dashboard' %}" class="btn-dashboard">← Return to Dashboard</a>
    </div>
</body>
</html>
